name: ci
on:
  pull_request:
  push:
    branches: [main]
jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      # Real GUI gate: boots the actual Electron shell (headless via xvfb) and asserts
      # single isolated window + renderer ready. Catches install/runtime failures
      # (blocked postinstall, CSP blocking the renderer) that static checks cannot.
      # Ubuntu 24.04 restricts unprivileged user namespaces, which forces Electron onto
      # the SUID sandbox helper (impossible inside node_modules) — lift the restriction
      # so Chromium's userns sandbox works and the smoke runs fully sandboxed.
      - run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
      - run: xvfb-run -a pnpm desktop:smoke
