name: Bug
description: 缺陷报告
labels: ["type:bug", "origin:human"]
body:
  - type: textarea
    id: symptom
    attributes:
      label: 现象
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: 复现步骤
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
  - type: textarea
    id: context
    attributes:
      label: 环境与线索
      description: 版本、日志、相关 spec 或 issue
